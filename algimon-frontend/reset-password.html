<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Algimon | Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --color-brand-red: #5e2121;
      --color-brand-accent: #c94e32;
      --color-brand-accent-hover: #e05e42;
      --color-bg-light: #f4f5f7;
      --color-border: #e1e3e6;
      --color-text-dark: #333333;
      --color-text-muted: #888888;
      --color-error: #dc2626;
      --color-error-bg: #fee2e2;
      --color-success: #16a34a;
      --color-success-bg: #dcfce7;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f7f7f8 0%, #e9ecef 100%);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .reset-container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      animation: floatIn 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(30px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .reset-header {
      background: #401f1c;
      padding: 32px 32px 28px;
      text-align: center;
    }

    .logo-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 0 auto 16px;
    }

    .logo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .reset-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }

    .reset-header p {
      color: #e0d8d7;
      font-size: 0.85rem;
    }

    .reset-body {
      padding: 36px 32px 42px;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 8px;
    }

    .input-label i {
      color: #df5345;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 48px 12px 14px;
      font-size: 0.95rem;
      border: 1px solid #e1e3e6;
      border-radius: 6px;
      background: #f4f5f7;
      transition: all 0.2s ease;
    }

    .input-wrapper input:focus {
      border-color: #df5345;
      outline: none;
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(223, 83, 69, 0.1);
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      background: transparent;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .strength-meter {
      margin-top: 10px;
      height: 4px;
      background: #e1e3e6;
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-fill {
      width: 0%;
      height: 100%;
      border-radius: 4px;
      transition: width 0.25s ease, background 0.2s;
    }

    .strength-text {
      font-size: 0.7rem;
      margin-top: 6px;
      text-align: right;
      color: #888;
    }

    .password-reqs-hint {
      font-size: 0.72rem;
      margin-top: 3px;
      min-height: 14px;
      font-weight: 500;
      transition: color 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .password-reqs-hint.warn { color: #d97706; }
    .password-reqs-hint.warn::before { content: '⚠ '; }
    .password-reqs-hint.ok  { color: #16a34a; }

    .password-policy-box {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 6px;
      padding: 8px 12px;
      margin-top: 8px;
      font-size: 0.78rem;
      color: #92400e;
      line-height: 1.4;
      font-family: 'Inter', sans-serif;
    }
    .password-policy-box .policy-icon { font-size: 0.9rem; flex-shrink: 0; margin-top: 1px; }
    .password-policy-box strong { color: #7c2d12; }

    .error-message {
      background: #fee2e2;
      border-left: 4px solid #dc2626;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #991b1b;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .success-message {
      background: #dcfce7;
      border-left: 4px solid #16a34a;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #166534;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reset-btn {
      background: linear-gradient(135deg, #df5345 0%, #c94639 100%);
      border: none;
      width: 100%;
      padding: 14px;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 1px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .reset-btn:hover {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      transform: translateY(-2px);
    }

    .reset-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: #ac301d;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back-link a:hover {
      color: #401f1c;
    }

    hr {
      margin: 20px 0 10px;
      border-top: 1px solid #e1e3e6;
    }

    .inline-warning {
      font-size: 0.7rem;
      color: #dc2626;
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>
<body>

<div class="reset-container">
  <div class="reset-header">
    <div class="logo-circle">
      <img src="images/algimonlogo.png" alt="Algimon">
    </div>
    <h1>Reset Your Password</h1>
    <p>Create a new, strong password for your account</p>
  </div>

  <div class="reset-body">
    <div id="messageContainer"></div>

    <form id="resetPasswordForm">
      <div class="input-group">
        <div class="input-label">
          <i class="fas fa-lock"></i>
          <span>New Password</span>
        </div>
        <div class="input-wrapper">
          <input type="password" id="newPassword" placeholder="Enter new password" autocomplete="new-password">
          <button type="button" class="toggle-pw" data-target="newPassword">Show</button>
        </div>
        <div class="strength-meter">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <div class="strength-text" id="strengthLabel">Min 8 chars &middot; 1 uppercase &middot; 1 special character</div>
        <div class="password-reqs-hint" id="resetPwReqs"></div>
        <div class="password-policy-box">
          <span class="policy-icon">&#128274;</span>
          <span>Password must have: <strong>8+ characters</strong>, <strong>1 uppercase letter</strong> (A&ndash;Z), and <strong>1 special character</strong> (e.g.&nbsp;!&nbsp;@&nbsp;#&nbsp;$)</span>
        </div>
      </div>

      <div class="input-group">
        <div class="input-label">
          <i class="fas fa-check-circle"></i>
          <span>Confirm New Password</span>
        </div>
        <div class="input-wrapper">
          <input type="password" id="confirmPassword" placeholder="Confirm your new password">
          <button type="button" class="toggle-pw" data-target="confirmPassword">Show</button>
        </div>
        <div id="confirmMatchWarning" class="inline-warning" style="display: none;">
          <i class="fas fa-circle-exclamation"></i> Passwords do not match
        </div>
      </div>

      <button type="submit" class="reset-btn" id="submitResetBtn">
        <i class="fas fa-key"></i> RESET PASSWORD
      </button>
    </form>

    <hr>
    <div class="back-link">
      <a href="login.html">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </div>
  </div>
</div>

<script>
  // ============================================
  // REAL BACKEND API CONNECTION
  // ============================================
  const API_BASE_URL = 'http://localhost/algimon-api';

  const newPwInput = document.getElementById('newPassword');
  const confirmPwInput = document.getElementById('confirmPassword');
  const strengthFill = document.getElementById('strengthFill');
  const strengthLabel = document.getElementById('strengthLabel');
  const form = document.getElementById('resetPasswordForm');
  const submitBtn = document.getElementById('submitResetBtn');
  const messageContainer = document.getElementById('messageContainer');
  const confirmMatchWarning = document.getElementById('confirmMatchWarning');

  function showMessage(type, text) {
    messageContainer.innerHTML = '';
    const div = document.createElement('div');
    div.className = type === 'error' ? 'error-message' : 'success-message';
    const icon = type === 'error' ? '<i class="fas fa-exclamation-triangle"></i>' : '<i class="fas fa-check-circle"></i>';
    div.innerHTML = `${icon} <span>${text}</span>`;
    messageContainer.appendChild(div);
  }

  function evaluateStrength(password) {
    if (!password) return { width: '0%', color: '#e1e3e6', label: 'Very weak' };
    let score = 0;
    if (password.length >= 6) score++;
    if (password.length >= 12) score++;
    if (/[A-Z]/.test(password)) score++;
    if (/[0-9]/.test(password)) score++;
    if (/[^A-Za-z0-9]/.test(password)) score++;
    
    const scoreMap = {
      0: { width: '10%', color: '#e1e3e6', label: 'Very weak' },
      1: { width: '25%', color: '#f87171', label: 'Weak' },
      2: { width: '45%', color: '#f97316', label: 'Fair' },
      3: { width: '65%', color: '#eab308', label: 'Good' },
      4: { width: '85%', color: '#22c55e', label: 'Strong' },
      5: { width: '100%', color: '#15803d', label: 'Very strong' }
    };
    let idx = Math.min(score, 5);
    if (password.length === 0) idx = 0;
    else if (score === 0 && password.length > 0) idx = 1;
    return scoreMap[idx];
  }

  const resetPwReqs = document.getElementById('resetPwReqs');

  function updateStrengthMeter() {
    const pwd = newPwInput.value;
    const strength = evaluateStrength(pwd);
    strengthFill.style.width = strength.width;
    strengthFill.style.backgroundColor = strength.color;
    if (pwd.length === 0) {
      strengthLabel.innerHTML = 'Min 8 chars &middot; 1 uppercase &middot; 1 special character';
    } else if (pwd.length < 8) {
      strengthLabel.innerHTML = `Strength: ${strength.label} &middot; needs ${8 - pwd.length} more char${8 - pwd.length !== 1 ? 's' : ''}`;
    } else {
      strengthLabel.innerHTML = `Strength: ${strength.label}`;
    }
    // Live requirements hint
    if (resetPwReqs) {
      if (pwd.length === 0) {
        resetPwReqs.textContent = '';
        resetPwReqs.className = 'password-reqs-hint';
      } else {
        const missing = [];
        if (pwd.length < 8)            missing.push(`${8 - pwd.length} more char${8 - pwd.length !== 1 ? 's' : ''}`);
        if (!/[A-Z]/.test(pwd))        missing.push('1 uppercase letter');
        if (!/[^A-Za-z0-9]/.test(pwd)) missing.push('1 special character');
        if (missing.length > 0) {
          resetPwReqs.textContent = `Still needs: ${missing.join(', ')}`;
          resetPwReqs.className = 'password-reqs-hint warn';
        } else {
          resetPwReqs.textContent = '✓ Password meets all requirements';
          resetPwReqs.className = 'password-reqs-hint ok';
        }
      }
    }
    checkPasswordMatch();
  }

  function checkPasswordMatch() {
    const newPw = newPwInput.value;
    const confirmPw = confirmPwInput.value;
    if (confirmPw.length > 0 && newPw !== confirmPw) {
      confirmMatchWarning.style.display = 'flex';
    } else {
      confirmMatchWarning.style.display = 'none';
    }
  }

  const resetPasswordRegex = /^(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}$/;

  function validateForm() {
    const newPw = newPwInput.value;
    const confirmPw = confirmPwInput.value;

    if (!newPw) {
      showMessage('error', 'Please enter a new password.');
      return false;
    }
    if (!resetPasswordRegex.test(newPw)) {
      let hint = 'Password must be at least 8 characters';
      if (!/[A-Z]/.test(newPw))        hint += ', include at least 1 uppercase letter';
      if (!/[^A-Za-z0-9]/.test(newPw)) hint += ', include at least 1 special character';
      showMessage('error', hint + '.');
      return false;
    }
    if (newPw !== confirmPw) {
      showMessage('error', 'New password and confirmation do not match.');
      return false;
    }
    return true;
  }

  newPwInput.addEventListener('input', updateStrengthMeter);
  confirmPwInput.addEventListener('input', checkPasswordMatch);

  // Toggle password visibility
  document.querySelectorAll('.toggle-pw').forEach(btn => {
    btn.addEventListener('click', function() {
      const targetId = this.getAttribute('data-target');
      const input = document.getElementById(targetId);
      if (input) {
        const type = input.type === 'password' ? 'text' : 'password';
        input.type = type;
        this.textContent = type === 'text' ? 'Hide' : 'Show';
      }
    });
  });

  // ============================================
  // REAL API CALL - NOT MOCK!
  // ============================================
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    if (!validateForm()) return;

    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');
    const userType = urlParams.get('type') || 'client';

    if (!resetToken) {
      showMessage('error', 'Invalid reset link. Please request a new password reset.');
      return;
    }

    const newPassword = newPwInput.value;

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> RESETTING...';

    try {
      const response = await fetch(`${API_BASE_URL}/auth/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: resetToken,
          password: newPassword,
          user_type: userType
        })
      });

     const rawText = await response.text();
      
      let result;
      try {
        result = JSON.parse(rawText);
      } catch(e) {
        showMessage('error', 'Server error: ' + rawText);
        return;
      }

      if (result.success) {
        showMessage('success', '✓ Password reset successful! Redirecting to login...');
        newPwInput.value = '';
        confirmPwInput.value = '';
        updateStrengthMeter();
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2300);
      } else {
        showMessage('error', result.message || 'Password reset failed. Please request a new link.');
      }
    } catch (error) {
      console.error('Reset error:', error);
      showMessage('error', 'Cannot connect to server. Please make sure backend is running.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-key"></i> RESET PASSWORD';
    }
  });

  updateStrengthMeter();
</script>
</body>
</html>
